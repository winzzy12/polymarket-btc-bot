<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Up/Down Trading Bot - Polymarket</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3a 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        
        .title h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .title p {
            color: #888;
            font-size: 14px;
        }
        
        .control-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .control-btn.start {
            background: #00ff88;
            color: #1a1a2a;
        }
        
        .control-btn.stop {
            background: #ff4444;
            color: white;
        }
        
        .control-btn:hover {
            transform: scale(1.05);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .stat-card h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-card .value.positive {
            color: #00ff88;
        }
        
        .stat-card .value.negative {
            color: #ff4444;
        }
        
        .config-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .config-panel h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .config-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .form-group input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
        }
        
        .save-btn {
            padding: 10px 20px;
            background: #4a90e2;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            align-self: flex-end;
        }
        
        .trades-table {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
        }
        
        .trades-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .trades-table th,
        .trades-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .trades-table th {
            color: #aaa;
            font-weight: normal;
        }
        
        .badge-up {
            background: #00ff8822;
            color: #00ff88;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .badge-down {
            background: #ff444422;
            color: #ff4444;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .badge-hedge {
            background: #ffaa0022;
            color: #ffaa00;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .chart-container {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        canvas {
            max-height: 300px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-indicator.running {
            background: #00ff88;
            animation: pulse 1s infinite;
        }
        
        .status-indicator.stopped {
            background: #ff4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>🤖 BTC Up/Down Trading Bot</h1>
                <p>Polymarket - Two-Leg Reversal Strategy</p>
            </div>
            <div>
                <button id="startBtn" class="control-btn start">▶ Start Bot</button>
                <button id="stopBtn" class="control-btn stop">⏹ Stop Bot</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Bot Status</h3>
                <div class="value">
                    <span id="statusIndicator" class="status-indicator stopped"></span>
                    <span id="botStatus">Stopped</span>
                </div>
            </div>
            <div class="stat-card">
                <h3>Total P&L</h3>
                <div class="value" id="totalPnl">$0.00</div>
            </div>
            <div class="stat-card">
                <h3>Win Rate</h3>
                <div class="value" id="winRate">0%</div>
            </div>
            <div class="stat-card">
                <h3>Active Positions</h3>
                <div class="value" id="activePositions">0</div>
            </div>
            <div class="stat-card">
                <h3>USDC Balance</h3>
                <div class="value" id="usdcBalance">$0.00</div>
            </div>
            <div class="stat-card">
                <h3>Total Trades</h3>
                <div class="value" id="totalTrades">0</div>
            </div>
        </div>
        
        <div class="config-panel">
            <h2>⚙️ Strategy Configuration</h2>
            <div class="config-form">
                <div class="form-group">
                    <label>Stake per Trade (USD)</label>
                    <input type="number" id="stakeUSD" step="1" value="10">
                </div>
                <div class="form-group">
                    <label>Max Positions</label>
                    <input type="number" id="maxPositions" value="5">
                </div>
                <div class="form-group">
                    <label>Max Daily Loss (USD)</label>
                    <input type="number" id="maxDailyLoss" step="10" value="50">
                </div>
                <div class="form-group">
                    <label>Sum Target (hedge trigger)</label>
                    <input type="number" id="sumTarget" step="0.01" value="0.95">
                </div>
                <div class="form-group">
                    <label>Dump Threshold (%)</label>
                    <input type="number" id="movePct" step="0.01" value="0.15">
                </div>
                <div class="form-group">
                    <label>Entry Window (minutes)</label>
                    <input type="number" id="windowMin" step="0.5" value="2">
                </div>
                <div class="form-group">
                    <label>Min Liquidity (USD)</label>
                    <input type="number" id="minLiquidity" step="500" value="2000">
                </div>
                <button class="save-btn" onclick="saveConfig()">💾 Save Configuration</button>
            </div>
        </div>
        
        <div class="chart-container">
            <h2 style="margin-bottom: 15px;">📈 Equity Curve</h2>
            <canvas id="equityChart"></canvas>
        </div>
        
        <div class="trades-table">
            <h2 style="margin-bottom: 15px;">📊 Recent Trades</h2>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>Side</th>
                        <th>Price</th>
                        <th>Size</th>
                        <th>P&L</th>
                    </tr>
                </thead>
                <tbody id="tradesTableBody">
                    <tr><td colspan="6" style="text-align: center;">No trades yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        const socket = io();
        let equityData = [];
        let equityChart = null;
        
        // Initialize Chart
        function initChart() {
            const ctx = document.getElementById('equityChart').getContext('2d');
            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Portfolio Value',
                        data: [],
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.1)',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } },
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#fff' } }
                    }
                }
            });
        }
        
        // Fetch status
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('botStatus').innerText = data.running ? 'Running' : 'Stopped';
                const indicator = document.getElementById('statusIndicator');
                indicator.className = `status-indicator ${data.running ? 'running' : 'stopped'}`;
                
                document.getElementById('totalPnl').innerHTML = `$${data.stats.totalPnl?.toFixed(2) || '0.00'}`;
                document.getElementById('winRate').innerHTML = `${((data.stats.winRate || 0) * 100).toFixed(1)}%`;
                document.getElementById('activePositions').innerHTML = data.stats.activePositions || 0;
                document.getElementById('totalTrades').innerHTML = data.stats.totalTrades || 0;
                
                if (data.balance) {
                    document.getElementById('usdcBalance').innerHTML = `$${data.balance.usdc?.toFixed(2) || '0.00'}`;
                }
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }
        
        // Fetch trades
        async function fetchTrades() {
            try {
                const response = await fetch('/api/trades?limit=20');
                const trades = await response.json();
                
                const tbody = document.getElementById('tradesTableBody');
                if (trades.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No trades yet</td></tr>';
                    return;
                }
                
                tbody.innerHTML = trades.reverse().map(trade => `
                    <tr>
                        <td>${new Date(trade.timestamp).toLocaleTimeString()}</td>
                        <td><span class="badge-${trade.type === 'HEDGE' ? 'hedge' : (trade.side === 'UP' ? 'up' : 'down')}">${trade.type || 'TRADE'}</span></td>
                        <td>${trade.side || '-'}</td>
                        <td>$${trade.entryPrice?.toFixed(3) || '-'}</td>
                        <td>$${trade.size?.toFixed(2) || '-'}</td>
                        <td class="${trade.pnl > 0 ? 'positive' : (trade.pnl < 0 ? 'negative' : '')}">${trade.pnl ? `$${trade.pnl.toFixed(2)}` : '-'}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error fetching trades:', error);
            }
        }
        
        // Fetch config
        async function fetchConfig() {
            try {
                const response = await fetch('/api/strategy');
                const config = await response.json();
                
                document.getElementById('stakeUSD').value = config.stakeUSD || 10;
                document.getElementById('maxPositions').value = config.maxPositions || 5;
                document.getElementById('maxDailyLoss').value = config.maxDailyLoss || 50;
                document.getElementById('sumTarget').value = config.sumTarget || 0.95;
                document.getElementById('movePct').value = config.movePct || 0.15;
                document.getElementById('windowMin').value = config.windowMin || 2;
                document.getElementById('minLiquidity').value = config.minLiquidity || 2000;
            } catch (error) {
                console.error('Error fetching config:', error);
            }
        }
        
        // Save config
        async function saveConfig() {
            const config = {
                stakeUSD: parseFloat(document.getElementById('stakeUSD').value),
                maxPositions: parseInt(document.getElementById('maxPositions').value),
                maxDailyLoss: parseFloat(document.getElementById('maxDailyLoss').value),
                sumTarget: parseFloat(document.getElementById('sumTarget').value),
                movePct: parseFloat(document.getElementById('movePct').value),
                windowMin: parseFloat(document.getElementById('windowMin').value),
                minLiquidity: parseFloat(document.getElementById('minLiquidity').value)
            };
            
            try {
                const response = await fetch('/api/strategy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                if (response.ok) {
                    alert('Configuration saved!');
                }
            } catch (error) {
                console.error('Error saving config:', error);
            }
        }
        
        // Start/Stop bot
        async function startBot() {
            try {
                await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'start' })
                });
                fetchStatus();
            } catch (error) {
                console.error('Error starting bot:', error);
            }
        }
        
        async function stopBot() {
            try {
                await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'stop' })
                });
                fetchStatus();
            } catch (error) {
                console.error('Error stopping bot:', error);
            }
        }
        
        // WebSocket events
        socket.on('position_opened', (data) => {
            console.log('Position opened:', data);
            fetchStatus();
            fetchTrades();
        });
        
        socket.on('position_closed', (data) => {
            console.log('Position closed:', data);
            fetchStatus();
            fetchTrades();
        });
        
        // Initial load
        initChart();
        fetchStatus();
        fetchTrades();
        fetchConfig();
        
        // Refresh every 5 seconds
        setInterval(fetchStatus, 5000);
        setInterval(fetchTrades, 10000);
        
        // Button handlers
        document.getElementById('startBtn').onclick = startBot;
        document.getElementById('stopBtn').onclick = stopBot;
    </script>
</body>
</html>
